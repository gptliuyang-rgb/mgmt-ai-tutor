<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arxiv Daily Digest</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <h1>Arxiv Daily Digest</h1>
        <p>每日 UTC 00:00 自动更新：具身智能 + 大模型/Agent 论文。</p>
        <div id="meta" class="meta">正在加载今日摘要...</div>
      </header>

      <section class="toolbar">
        <label>日期
          <select id="dateSelect"></select>
        </label>
        <label>模块
          <select id="moduleFilter">
            <option value="all">全部</option>
            <option value="embodied">具身智能</option>
            <option value="llm_agent">大模型 / Agent</option>
          </select>
        </label>
      </section>

      <section>
        <h2>具身智能模块</h2>
        <div id="embodiedList" class="paper-list"></div>
      </section>

      <section>
        <h2>大模型与 Agent 模块</h2>
        <div id="llmList" class="paper-list"></div>
      </section>
    </main>

    <template id="paperTpl">
      <article class="paper-card">
        <img class="cover" alt="paper image" />
        <div class="body">
          <h3 class="title"></h3>
          <p class="aff"></p>
          <p class="summary"></p>
          <div class="tags"></div>
          <div class="actions">
            <a class="detail-link" target="_blank" rel="noopener">详情页</a>
            <a class="pdf-link" target="_blank" rel="noopener">PDF</a>
            <button class="like-btn">👍 <span>0</span></button>
            <button class="fav-btn">⭐ 收藏</button>
          </div>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
